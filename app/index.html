<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Super Assistant · 个人外脑</title>
  <link rel="stylesheet" href="./styles.css?v=20260625a" />
</head>
<body>

  <!-- Overlay for sidebar -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Left sidebar (collapsible) -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-logo">谋</div>
      <div>
        <strong>Super Assistant</strong>
        <small>个人外脑</small>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item active" data-page="chat">💬 对话</a>
      <a class="nav-item" data-page="history">📋 历史</a>
      <a class="nav-item" data-page="memory">🧠 记忆</a>
      <a class="nav-item" data-page="settings">⚙ 设置</a>
    </nav>
    <div class="sidebar-footer">
      <small>Claude Code 外脑已就绪</small>
    </div>
  </aside>

  <!-- Main app -->
  <div class="app-main">

    <!-- Header -->
    <header class="app-header">
      <button class="menu-btn" id="menuBtn" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
      <h1 class="header-title">Super Assistant</h1>
      <span class="header-status" id="headerStatus">就绪</span>
    </header>

    <!-- Chat area -->
    <div class="chat-area" id="chatArea">

      <!-- Welcome state -->
      <div class="welcome" id="welcome">
        <div class="welcome-icon">
          <svg viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="28" stroke="#6366f1" stroke-width="1.5" opacity="0.25"/><circle cx="32" cy="32" r="14" stroke="#6366f1" stroke-width="1" opacity="0.4"/><circle cx="32" cy="32" r="4" fill="#6366f1" opacity="0.6"/></svg>
        </div>
        <p class="welcome-greeting">今天想让我帮你处理什么？</p>
        <p class="welcome-sub">我可以帮你深度分析、项目规划、决策推演、记忆检索</p>
      </div>

      <!-- Messages rendered here -->
      <div class="messages" id="messages"></div>

    </div>

    <!-- Input bar (fixed bottom) -->
    <div class="input-bar">
      <form class="input-form" id="chatForm">
        <textarea id="chatInput" rows="1"
          placeholder="输入你想分析、规划或处理的问题…"
          required></textarea>
        <button type="submit" id="sendBtn" aria-label="发送">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        </button>
      </form>
    </div>

  </div>

  <script src="./app.js?v=20260625a"></script>
</body>
</html>
