<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Super Assistant · 个人外脑</title>
<link rel="stylesheet" href="./styles.css?v=20260625c" />
</head>
<body>
<div class="mobile-shell">
  <aside class="side-rail" id="sideRail" aria-label="功能入口">
    <button class="menu-toggle" id="menuToggle" type="button" aria-label="展开功能栏" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <nav class="rail-nav" aria-label="Super Assistant 功能">
      <button class="rail-item active" type="button" data-feature="记忆" title="记忆">
        <span class="rail-icon brain-icon" aria-hidden="true"></span><span class="rail-label">记忆</span>
      </button>
      <button class="rail-item" type="button" data-feature="工具" title="工具">
        <span class="rail-icon tool-icon" aria-hidden="true"></span><span class="rail-label">工具</span>
      </button>
      <button class="rail-item" type="button" data-feature="创作" title="创作">
        <span class="rail-icon write-icon" aria-hidden="true"></span><span class="rail-label">创作</span>
      </button>
      <button class="rail-item" type="button" data-feature="项目" title="项目">
        <span class="rail-icon project-icon" aria-hidden="true"></span><span class="rail-label">项目</span>
      </button>
      <button class="rail-item" type="button" data-feature="分析" title="分析">
        <span class="rail-icon chart-icon" aria-hidden="true"></span><span class="rail-label">分析</span>
      </button>
      <button class="rail-item" type="button" data-feature="自动化" title="自动化">
        <span class="rail-icon bolt-icon" aria-hidden="true"></span><span class="rail-label">自动化</span>
      </button>
      <button class="rail-item" type="button" data-feature="设置" title="设置">
        <span class="rail-icon spark-icon" aria-hidden="true"></span><span class="rail-label">设置</span>
      </button>
    </nav>
  </aside>

  <div class="sidebar-scrim" id="sidebarScrim" hidden></div>

  <main class="home-screen" id="homeScreen">
    <header class="identity-area">
      <div class="brand-line">
        <div class="brand-mark" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </div>
        <h1>外脑 <span>Super Assistant</span></h1>
        <span class="pro-badge">Pro</span>
      </div>
      <p>我在，今天想让我帮你处理什么？</p>
      <div class="online-pill" aria-label="在线状态">
        <img src="./assets/assistant-avatar.svg" alt="" />
        <span></span>在线
      </div>
    </header>

    <section class="brain-hero" aria-label="外脑核心">
      <div class="orb-wrap">
        <div class="memory-orb" aria-hidden="true">
          <img src="./assets/brain-core.svg" alt="" />
        </div>
        <div class="orb-ring" aria-hidden="true"></div>
      </div>
      <div class="status-grid" aria-label="外脑状态">
        <article class="mini-card">
          <span class="status-dot green"></span>
          <strong>记忆在线</strong>
          <small>已连接你的长期上下文</small>
        </article>
        <article class="mini-card">
          <span class="status-dot blue"></span>
          <strong>上下文已连接</strong>
          <small>正在理解当前任务</small>
        </article>
        <article class="mini-card compact">
          <span class="status-dot violet"></span>
          <strong>随时响应</strong>
          <small>专注为你服务</small>
        </article>
      </div>
      <div class="core-command" aria-hidden="true">
        <span class="voice-orb"><i></i></span>
        <span class="command-text">点击说话，或长按输入</span>
        <span class="wave-mark"><i></i><i></i><i></i></span>
        <img class="mini-companion" src="./assets/mini-companion.svg" alt="" />
      </div>
    </section>

    <section class="answer-stack" id="answerStack" aria-live="polite">
      <article class="answer-card" id="answerCard">
        <div class="answer-meta"><span class="answer-sigil" aria-hidden="true"></span>外脑 · 刚刚</div>
        <div class="answer-copy" id="answerCopy">
          我已上线，记忆与上下文连接完成。<br>
          你可以直接把问题交给我，我会帮你整理思路、分析信息或推进下一步。
        </div>
        <details class="run-details" id="runDetails">
          <summary>运行详情</summary>
          <dl>
            <div><dt>job_id</dt><dd id="debugJobId">-</dd></div>
            <div><dt>status</dt><dd id="debugStatus">ready</dd></div>
            <div><dt>confidence</dt><dd id="debugConfidence">-</dd></div>
            <div><dt>debug message</dt><dd id="debugMessage">等待输入</dd></div>
          </dl>
        </details>
      </article>
    </section>
  </main>

  <form class="dock-input" id="chatForm">
    <button class="voice-button" type="button" aria-label="语音输入">
      <span></span>
    </button>
    <textarea id="chatInput" rows="1" placeholder="输入你想让我分析、规划或处理的问题……" required></textarea>
    <button class="send-button" id="sendBtn" type="submit" aria-label="发送">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 19V5m0 0-7 7m7-7 7 7"/></svg>
    </button>
  </form>
</div>

<script src="./app.js?v=20260625c"></script>
</body>
</html>
